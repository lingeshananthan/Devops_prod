<!DOCTYPE html>
<html>
<head>
    <title>Cloud Dashboard</title>
    <style>
        body { font-family: sans-serif; background: #1a1a2e; color: white; text-align: center; padding: 50px; }
        .card { background: #16213e; border-radius: 15px; padding: 20px; display: inline-block; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h1 { color: #4ecca3; }
        .stat { font-size: 1.2rem; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🚀 Deployment Successful</h1>
        <p class="stat"><strong>Hostname:</strong> {{ hostname }}</p>
        <p class="stat"><strong>Internal IP:</strong> {{ ip }}</p>
        <p class="stat"><strong>OS Version:</strong> {{ os }}</p>
        <hr>
        <p>Built with Jenkins, Docker, and AWS</p>
    </div>
</body>
</html>
